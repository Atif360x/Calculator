<!DOCTYPE html>
<html>

<head>
  <link rel="stylesheet" href="style.css">
  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
</head>

<body>
  <div class="background">
    <div class="calculator-body">
      <div class="display">
        <input id="jsDisplay" type="text" readonly placeholder="0">
      </div>
      
      <div class="btns">
        <button class="btn" id="jsSeven">7</button>
<button class="btn" id="jsEight">8</button>
<button class="btn" id="jsNine">9</button>
<button class="btn btnc" id="jsAdd">+</button>
<button class="btn" id="jsFour">4</button>
<button class="btn" id="jsFive">5</button>
<button class="btn" id="jsSix">6</button>
<button class="btn btnc" id="jsSub">-</button>
<button class="btn" id="jsOne">1</button>
<button class="btn" id="jsTwo">2</button>
<button class="btn" id="jsThree">3</button>
<button class="btn btnc" id="jsMul">×</button>
<button class="btn btnc" id="jsClear">C</button>
<button class="btn" id="jsZero">0</button>
<button class="btn btnc" id="jsEqual">=</button>
<button class="btn btnc" id="jsDiv">÷</button>
      </div>
    </div>
  </div>
  
  <script src="script.js"></script>
</body>

</html>
